workflows:
  ios-only:
    name: iOS Only Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.4.x
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.konan

    scripts:
      - name: Prepare Gradle
        script: chmod +x ./gradlew

      # Build apenas o necessário do KMP (evita perda de tempo)
      - name: Build shared module
        script: ./gradlew :composeApp:assemble

      # Build iOS real + gerar .ipa
      - name: Build iOS (IPA)
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/iosApp.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/iosApp.xcarchive \
            -exportOptionsPlist iosApp/exportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa