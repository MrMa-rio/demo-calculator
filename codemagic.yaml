workflows:
  ios-only:
    name: iOS Only Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.4.x
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.marsn.demo_calculator
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.konan

    scripts:
      - name: Prepare Gradle
        script: chmod +x ./gradlew

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Build signed iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
